worker_processes auto;
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile   on;
    keepalive_timeout 65;

    # Generated from /etc/nginx/templates/ by the nginx docker entrypoint
    include /etc/nginx/conf.d/*.conf;
}

# ── gRPC TCP passthrough ───────────────────────────────────────────────────────
# grpc_pass is NOT used here: it terminates TLS and strips the client certificate
# before Core can verify it. Raw TCP proxy_pass preserves the mTLS handshake
# end-to-end, letting Core enforce RequireAndVerifyClientCert itself.
stream {
    # mTLS Tunnel — runners' long-lived bidirectional stream (Core port 50051).
    # proxy_timeout must exceed the gRPC keepalive interval (60 s) so the stream
    # proxy never tears down an idle-but-alive connection.
    server {
        listen 8443;
        proxy_pass          noderouter-core:50051;
        proxy_timeout       3600s;
        proxy_connect_timeout 5s;
    }

    # Plaintext Enroll — HMAC-authenticated CSR signing (Core port 50052).
    server {
        listen 8444;
        proxy_pass          noderouter-core:50052;
        proxy_timeout       30s;
        proxy_connect_timeout 5s;
    }
}
